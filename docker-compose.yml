services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: fittrack_api

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db
      - redis

  db:
    image: postgres:17

    container_name: fittrack_db

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: UTC
      PGTZ: UTC

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: fittrack_redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: